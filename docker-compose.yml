services:
  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: pc_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - pc_network

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: pc_backend
    restart: unless-stopped
    ports:
      - '4000:5000'
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/productcatalog
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    depends_on:
      - mongo
    networks:
      - pc_network

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET}
    container_name: pc_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - pc_network

volumes:
  mongo_data:

networks:
  pc_network:
    driver: bridge
