# ── MongoDB StatefulSet ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pc-mongo
  labels:
    app: pc-mongo
spec:
  serviceName: "pc-mongo"
  replicas: 1
  selector:
    matchLabels:
      app: pc-mongo
  template:
    metadata:
      labels:
        app: pc-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:7
        ports:
        - containerPort: 27017
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
# ── MongoDB Headless Service ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: pc-mongo
  labels:
    app: pc-mongo
spec:
  ports:
  - port: 27017
    targetPort: 27017
  selector:
    app: pc-mongo
  clusterIP: None
